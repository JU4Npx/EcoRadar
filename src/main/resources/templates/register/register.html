<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="icon"
          type="image/png"
          sizes="32x32"
          href="/images/EcoRadarLogoSemNome.png">

    <title>EcoRadar - Cadastro</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">


    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet"
          href="/css/styles.css">

</head>

<body>

<main class="auth-page">

    <section class="auth-card shadow mb-5 mt-5">

        <header class="auth-card-header">

            <h3>
                Crie sua conta
            </h3>

        </header>

        <div th:if="${error}"
             class="alert alert-danger">

            <span th:text="${error}"></span>

        </div>

        <form class="auth-form"
              th:action="@{/register}"
              method="post">


            <div class="auth-field">

                <label for="email">
                    E-mail
                </label>

                <input type="email"
                       class="form-control"
                       id="email"
                       name="email"
                       placeholder="exemplo@dominio.com"
                       required>

            </div>


            <div class="auth-field">

                <label for="password">
                    Senha
                </label>

                <input type="password"
                       class="form-control"
                       id="password"
                       name="password"
                       placeholder="Digite sua senha"
                       required>

            </div>

            <div class="auth-field">

                <label for="confirmPassword">
                    Confirme sua senha
                </label>

                <input type="password"
                       class="form-control"
                       id="confirmPassword"
                       name="confirmPassword"
                       placeholder="Digite sua senha novamente"
                       required>

            </div>


            <div class="auth-field">

                <label for="cep">
                    CEP
                </label>

                <input type="text"
                       class="form-control"
                       id="cep"
                       name="cep"
                       placeholder="00000-000">

            </div>

            <div class="auth-field">

                <label for="estado">
                    Estado
                </label>

                <input type="text"
                       class="form-control"
                       id="estado"
                       name="estado">

            </div>

            <div class="auth-field">

                <label for="cidade">
                    Cidade
                </label>

                <input type="text"
                       class="form-control"
                       id="cidade"
                       name="cidade">

            </div>

            <div class="auth-field">

                <label for="bairro">
                    Bairro
                </label>

                <input type="text"
                       class="form-control"
                       id="bairro"
                       name="bairro">

            </div>

            <div class="auth-field">

                <label for="rua">
                    Rua
                </label>

                <input type="text"
                       class="form-control"
                       id="rua"
                       name="rua">

            </div>


            <div class="auth-field">

                <label for="numero">
                    Número
                </label>

                <input type="number"
                       class="form-control"
                       id="numero"
                       name="numero"
                       placeholder="Número">

            </div>

            <div class="auth-actions">

                <button type="submit"
                        class="btn btn-success auth-submit">

                    <i class="bi bi-box-arrow-in-right"></i>

                    Cadastrar

                </button>

                <a th:href="@{/login}"
                   class="btn btn-link text-secondary text-decoration-none auth-cancel">

                    Voltar

                </a>

            </div>

        </form>

    </section>

</main>

</body>
</html>
