<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/EcoRadarLogoSemNome.png">
    <title>Remover Eventos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<main class="container py-4">
    <section class="event-panel bg-white p-4 mx-auto">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <h1 class="h4 m-0">Remover eventos cadastrados</h1>
            <a class="btn btn-success" th:href="@{/eventos/novo}">
                <i class="bi bi-plus-circle me-2"></i>Criar
            </a>
        </div>

        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div th:if="${#lists.isEmpty(eventos)}" class="alert alert-info mb-0">
            Nenhum evento cadastrado.
        </div>

        <div th:if="${!#lists.isEmpty(eventos)}" class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th>Titulo</th>
                    <th>Area verde</th>
                    <th>Inicio</th>
                    <th>Status</th>
                    <th class="text-end">Acoes</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="evento : ${eventos}">
                    <td th:text="${evento.title}">Titulo</td>
                    <td th:text="${evento.greenArea != null ? evento.greenArea.name : '-'}">Area verde</td>
                    <td th:text="${evento.startDate}">Inicio</td>
                    <td th:text="${evento.status}">Status</td>
                    <td class="text-end">
                        <form th:action="@{/eventos/remover/{id}(id=${evento.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-danger btn-sm">
                                <i class="bi bi-trash me-1"></i>Remover
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
