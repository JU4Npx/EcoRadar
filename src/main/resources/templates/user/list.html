<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Usuários</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="container mt-5">

<h1 class="mb-4">Gerenciamento de Usuários</h1>

<table class="table table-bordered">

    <thead>

    <tr>
        <th>ID</th>
        <th>Email</th>
        <th>Tipo</th>
        <th>Ação</th>
    </tr>

    </thead>

    <tbody>

    <tr th:each="user : ${users}">

        <td th:text="${user.userId}"></td>

        <td th:text="${user.email}"></td>

        <td th:text="${user.type}"></td>

        <td>

            <form th:if="${user.type.name() != 'ADMIN'}"
                  th:action="@{/users/{id}/make-admin(id=${user.userId})}"
                  method="post">

                <button type="submit"
                        class="btn btn-success">

                    Tornar Admin
                </button>

            </form>

            <span th:if="${user.type.name() == 'ADMIN'}"
                  class="text-success">

                Administrador
            </span>

        </td>

    </tr>

    </tbody>

</table>

</body>
</html>
