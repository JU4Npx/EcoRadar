<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>EcoRadar - Usuários</title>

    <link rel="icon"
          type="image/png"
          sizes="32x32"
          href="/images/EcoRadarLogoSemNome.png">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">


    <link rel="stylesheet"
          href="/css/styles.css">

</head>

<body>

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <!-- CONTAINER BRANCO -->
    <div class="card shadow border-0 rounded-4 p-4 w-100"
         style="max-width: 1100px;">

        <!-- TOPO -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>

                <h1 class="fw-bold mb-1">
                    Gerenciamento de Usuários
                </h1>

                <p class="text-muted mb-0">
                    Lista completa de usuários cadastrados
                </p>

            </div>

            <a th:href="@{/home}"
               class="btn btn-success">

                Voltar

            </a>

        </div>

        <!-- TABELA -->
        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead class="table-success">

                <tr>

                    <th>ID</th>

                    <th>Email</th>

                    <th>Tipo</th>

                    <th class="text-center">
                        Ações
                    </th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="user : ${users}">

                    <!-- ID -->
                    <td th:text="${user.id}">
                    </td>

                    <!-- EMAIL -->
                    <td th:text="${user.email}">
                    </td>

                    <!-- TIPO -->
                    <td>

                        <span th:if="${user.type.name() == 'ADMIN'}"
                              class="badge bg-success">

                            ADMIN

                        </span>

                        <span th:if="${user.type.name() == 'USER'}"
                              class="badge bg-secondary">

                            USER

                        </span>

                    </td>

                    <!-- AÇÕES -->
                    <td class="text-center">

                        <!-- BOTÃO ADMIN -->
                        <form th:if="${user.type.name() != 'ADMIN'}"
                              th:action="@{/users/make-admin/{id}(id=${user.id})}"
                              method="get">

                            <button type="submit"
                                    class="btn btn-success btn-sm">

                                Tornar Admin

                            </button>

                        </form>

                        <!-- JÁ É ADMIN -->
                        <span th:if="${user.type.name() == 'ADMIN'}"
                              class="text-success fw-bold">

                            Administrador

                        </span>

                    </td>

                </tr>

                <!-- SEM USUÁRIOS -->
                <tr th:if="${#lists.isEmpty(users)}">

                    <td colspan="4"
                        class="text-center text-muted py-4">

                        Nenhum usuário encontrado.

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
