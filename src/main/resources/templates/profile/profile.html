<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/EcoRadarLogoSemNome.png">
    <title>Meu Perfil - EcoRadar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<main class="container py-5">
    <section class="bg-white shadow rounded p-4 profile-panel mx-auto">
        <div class="d-flex align-items-center gap-3 mb-4">
            <i class="bi bi-person-circle profile-avatar text-success"></i>
            <div>
                <h1 class="h4 mb-1">Meu Perfil</h1>
                <p class="text-secondary mb-0" th:text="${loggedUser}">usuario</p>
            </div>
        </div>

        <div class="d-flex justify-content-end">
            <a th:href="@{/logout}" class="btn btn-outline-danger">Sair</a>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
