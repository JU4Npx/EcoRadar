<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Favoritos - EcoRadar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/EcoRadarLogoSemNome.png">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">
    <div class="card shadow-lg border-0">
        <div class="card-header bg-success text-white text-center">
            <h3><i class="bi bi-star-fill"></i> Meus Favoritos</h3>
        </div>
        <div class="card-body p-4">
            <p class="text-muted text-center">Aqui estão os locais que você marcou como favoritos no EcoRadar:</p>
            <div class="row">
                <div class="col-md-6 col-lg-4 mb-4" th:each="item : ${favoritos}">
                    <div class="card h-100 shadow-sm border-0">
                        <div class="card-body text-center">
                            <!-- Nome -->
                            <h5 class="card-title text-success" th:text="${item}"></h5>
                            <!-- Imagem abaixo do nome -->
                            <div class="mb-3">
                                <i class="bi bi-image favorite-img"></i>
                            </div>
                            <!-- Descrição -->
                            <p class="card-text">Descubra mais detalhes sobre este local e adicione aos seus eventos.</p>
                        </div>
                        <div class="card-footer bg-transparent text-center">
                            <button class="btn btn-outline-success rounded-pill px-4">
                                <i class="bi bi-heart"></i> Ver detalhes
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
